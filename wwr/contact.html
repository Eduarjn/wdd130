<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | White Water Rafting</title>
  <meta name="description" content="Contact White Water Rafting Company for reservations, general inquiries, or website suggestions.">
  <meta name="author" content="Eduarjose Fajardo">
  <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>

  <header>
    <img src="images/rafting_company_logo.jpg" alt="White Water Rafting logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html" class="active">Contact Us</a>
    </nav>
  </header>

  <main>
    <section class="contact-header">
      <h1>White Water Rafting Company</h1>
      <address>
        123 Tamanaco River Street<br>
        Valle de la Pascua, Guarico<br>
        +55 19 9987 06006<br>
        <a href="mailto:info@whitewater.com">info@whitewater.com</a>
      </address>
    </section>

    <div class="contact-layout">
      </div>
      <div class="map-container">
        <iframe src="https://google.com" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

      </div>

      <div class="form-container">
        <form action="#" method="get">
          
          <div class="form-item">
            <label for="user_name">Name</label>
            <input type="text" id="user_name" name="user_name" placeholder="Placeholder" required>
          </div>

          <div class="form-item">
            <label for="user_email">Email</label>
            <input type="email" id="user_email" name="user_email" placeholder="Placeholder" required>
          </div>

          <fieldset class="form-item purpose-group">
            <legend>Message Purpose</legend>
            <div class="radio-options">
          <input type="radio" id="general" name="purpose" value="general" checked>
          <label for="general">General Inquiry</label>

          <input type="radio" id="reservation" name="purpose" value="reservation">
          <label for="reservation">Reservation Question</label>

          <input type="radio" id="suggestion" name="purpose" value="suggestion">
          <label for="suggestion">Website Suggestion</label>
          </div>
          </fieldset>

          <div class="form-item">
            <label for="user_message">Message</label>
            <textarea id="user_message" name="user_message" placeholder="Type here" rows="4" required></textarea>
          </div>

          <div class="checkbox-item">
    <input type="checkbox" id="newsletter" name="newsletter" value="subscribe" checked>
    <label for="newsletter">Please Subscribe me to the monthly newsletter</label>
</div>

          <button type="submit" class="submit-btn">Get in Touch!</button>
        </form>
      </div>
    </section>

    <section class="team-section">
      <h2>We Are Here to Serve You</h2>
      <div class="team-grid">
        <figure>
          <img src="images/happy_client.jpg" alt="Employee smiling ready for rafting">
          <figcaption>Employee Profile</figcaption>
        </figure>
        <figure>
          <img src="images/rafting_adventure.jpg" alt="Employee guiding a boat">
          <figcaption>Employee Profile</figcaption>
        </figure>
        <figure>
          <img src="images/happy_client.jpg" alt="Employee helping customers">
          <figcaption>Employee Profile</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 White Water Rafting Company | Eduarjose Fajardo</p>
    <nav class="socialmedia">
    <a href="#" aria-label="Facebook">
        <img src="images/facebook.png" alt="Facebook">
    </a>
    <a href="#" aria-label="Twitter">
        <img src="images/twitter.png" alt="Twitter">
    </a>
    <a href="#" aria-label="Instagram">
        <img src="images/instagram.png" alt="Instagram">
    </a>
</nav>
  </footer>

</body>
</html>
