<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | White Water Rafting</title>
  <meta name="description" content="Welcome to the best white water rafting adventures.">
  <meta name="author" content="Eduarjose Fajardo">
  <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>

  <header>
    <img src="images/rafting_company_logo.jpg" alt="White Water Rafting logo">
    <nav>
      <a href="index.html" class="active">Home</a>
      <a href="about.html">About Us</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact Us</a>
    </nav>
  </header>

  <main>
    <section class="home-hero">
      <img src="images/rafting_adventure.jpg" alt="Pessoas a fazer rafting">
      <h1>Feel the Adrenaline!</h1>
    </section>

    <section class="newsletter-section">
      <h2>Subscribe to our Newsletter</h2>
      <form action="#" method="get">
          <div class="form-item">
            <label for="news_name">Name</label>
            <input type="text" id="news_name" name="news_name" required>
          </div>
          <div class="form-item">
            <label for="news_email">Email</label>
            <input type="email" id="news_email" name="news_email" required>
        </div>
        <button type="submit" class="submit-btn">Subscribe</button>
      </form>
    </section>

    <section class="cta-section">
      <h2>Ready for the ultimate experience?</h2>
      <p>Check out our amazing river trips and book your adventure today.</p>
      <a href="trips.html" class="cta-button">See Our Trips</a>
    </section>

    <section class="home-grid">
      <figure>
        <img src="images/happy_client.jpg" alt="Cliente feliz">
        <figcaption>
          <h3>Safe and Fun</h3>
          <p>We provide the best guides and equipment so you can focus only on having fun.</p>
        </figcaption>
      </figure>
      <figure>
        <img src="images/rafting_adventure.jpg" alt="Descida no rio">
        <figcaption>
          <h3>Beautiful Rivers</h3>
          <p>Explore breathtaking landscapes while riding the best waves in the region.</p>
        </figcaption>
      </figure>
    </section>
  </main>

  <footer>
    <p>© 2026 White Water Rafting Company | Eduarjose Fajardo</p>
    <nav class="socialmedia">
      <a href="#" aria-label="Facebook">
        <img src="images/facebook.png" alt="Facebook">
      </a>
      <a href="#" aria-label="Twitter">
        <img src="images/twitter.png" alt="Twitter">
      </a>
      <a href="#" aria-label="Instagram">
        <img src="images/instagram.png" alt="Instagram">
      </a>
    </nav>
  </footer>

</body>
</html>
